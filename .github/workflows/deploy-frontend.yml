name: Deploy Frontend App to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'frontend-app/**'
      - '.github/workflows/deploy-frontend.yml'

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment 
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'frontend-app/package-lock.json'

      - name: Install Dependencies
        run: |
          cd frontend-app
          npm ci

      - name: Configure Backend API URL
        run: |
          if [ -n "${{ secrets.PRODUCTION_BACKEND_URL }}" ]; then
            echo "Setting backend URL to ${{ secrets.PRODUCTION_BACKEND_URL }}"
            sed -i 's|http://localhost:8000|${{ secrets.PRODUCTION_BACKEND_URL }}|g' frontend-app/src/app/core/services/ai.service.ts
          fi

      - name: Build Angular App
        run: |
          cd frontend-app
          npx ng build --configuration production --base-href /MaritimeProjectPlanningAI/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'frontend-app/dist/frontend-app/browser'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
